# XcodeGen spec for the Finmate iOS app (M0 shell + M1 Subscriptions slice).
# Generates Finmate.xcodeproj that links the local FinmateCore package.
# Regenerate with: xcodegen generate
name: Finmate
options:
  bundleIdPrefix: app.finmate
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGNING_ALLOWED: "NO"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    # App Store submission: standard HTTPS/Keychain crypto only — export-compliance exempt (docs/07 §9.2).
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    # Biometric app-lock toggle requires a Face ID usage description (docs/07 §9.2).
    INFOPLIST_KEY_NSFaceIDUsageDescription: "Finmate uses Face ID to lock the app."
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
packages:
  FinmateCore:
    path: Packages/FinmateCore
  FinmateData:
    path: Packages/FinmateData
targets:
  Finmate:
    type: application
    platform: iOS
    # Sign in with Apple capability (docs/07 §3). The entitlement is declared so the
    # signed release build carries it; AuthenticationServices links automatically.
    entitlements:
      path: App/Finmate.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    sources:
      - path: App/Sources
    dependencies:
      - package: FinmateCore
        product: Domain
      - package: FinmateCore
        product: Shared
      - package: FinmateData
        product: DataLayer
  # Store-layer unit tests — exercise the @Observable stores (load/mutate/error/
  # reorder/currency-recompute) against the in-memory + throwing mock repos that
  # live in the app module via `@testable import Finmate`.
  FinmateAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/Tests
    dependencies:
      - target: Finmate
      - package: FinmateCore
        product: Domain
      - package: FinmateData
        product: DataLayer
    settings:
      base:
        # Host the tests inside the app so `@testable import Finmate` resolves.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Finmate.app/Finmate"
        BUNDLE_LOADER: "$(TEST_HOST)"
  # Critical-flow smoke suite — drives the real UI through the offline "Try the
  # demo" path (no network): launch → onboarding → root TabView, tab navigation,
  # and add-subscription. Black-box XCUITest against the Finmate app under test.
  FinmateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/UITests
    dependencies:
      - target: Finmate
schemes:
  Finmate:
    build:
      targets:
        Finmate: all
        FinmateAppTests: [test]
        FinmateUITests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - Finmate
      targets:
        - FinmateAppTests
        - FinmateUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
