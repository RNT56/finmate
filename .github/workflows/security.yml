name: security

# Secret-scan gate (Gitleaks) — runs on every push and PR across the whole repo.
# The only permitted "secret" is the public Supabase anon key, which is not a
# secret; anything else (service-role keys, provider secrets, Apple .p8) fails.
# See docs/07-security-and-privacy.md §9 and docs/09-engineering-practices.md §5.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can scan past commits, not just the tip.
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          # Optional org license for gitleaks-action; the scan runs without it.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
