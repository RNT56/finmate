name: web

# Web client CI (Vite + React 19 + TypeScript) — lint, build, test + coverage gate.
# Scoped to the web/ subtree so iOS changes don't trigger it.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: lint · build · test · coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Runs the full Vitest suite (pure core + store/hook layer) AND enforces the
      # coverage thresholds configured in vite.config.ts (conservative 70% floor on
      # the measured logic layers). A real regression gate, set comfortably below the
      # current ~83% so it is not flaky. Subsumes the plain `npm test` run.
      - name: Test + coverage gate
        run: npm run coverage
