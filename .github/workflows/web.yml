name: web

# Web client CI (Vite + React 19 + TypeScript) — lint, build, test + coverage gate.
# Scoped to the web/ subtree so iOS changes don't trigger it.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: lint · build · test · coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Runs the full Vitest suite (pure core + store/hook layer) AND enforces the
      # coverage thresholds configured in vite.config.ts (conservative 70% floor on
      # the measured logic layers). A real regression gate, set comfortably below the
      # current ~83% so it is not flaky. Subsumes the plain `npm test` run.
      - name: Test + coverage gate
        run: npm run coverage

  # Playwright E2E smoke suite (mirrors the iOS XCUITest critical flows). Drives
  # the fully offline "Try the demo" path against the built+previewed app —
  # deterministic, no network, no Supabase. Separate job so a UI-flow failure is
  # distinguishable from a unit/coverage failure.
  e2e:
    name: e2e · playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Install only the Chromium browser the suite uses, with its OS deps.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # webServer in playwright.config.ts runs `npm run build && npm run preview`
      # on a fixed port; CI=true forces a fresh server (no reuse).
      - name: E2E (Playwright)
        run: npm run e2e

      # Keep the HTML report + traces on failure for debugging.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
